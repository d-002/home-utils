services:
  # Git server

  git-server:
    build: git-server
    container_name: git-server
    hostname: git-server
    restart: unless-stopped

    ports:
      - 22:22
    volumes:
      - ./git-server/repos:/home/git/repos
    networks:
      - private-git

  bridge-git:
    build: bridge-git
    container_name: bridge-git
    hostname: bridge-git
    restart: unless-stopped

    ports:
      - 22:22
    networks:
      - default
      - private-git

  # Password manager

  password-mgr:
    build: password-mgr
    container_name: password-mgr
    hostname: password-mgr
    #restart: unless-stopped

    environment:
      - DB_PATH=persistent/database.sqlite
    ports:
      - 80:80
    volumes:
      - ./password-mgr/persistent:/home/user/app/persistent
    networks:
      - private-pwd

  bridge-pwd:
    build: bridge-pwd
    container_name: bridge-pwd
    hostname: bridge-pwd
    restart: unless-stopped

    ports:
      - 80:80
    networks:
      - default
      - private-pwd

networks:
  private-git:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.3.1.0/24
          gateway: 172.3.1.254
  private-pwd:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.3.2.0/24
          gateway: 172.3.2.254
